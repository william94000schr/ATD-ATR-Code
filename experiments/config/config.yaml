# config.yaml
data:
  images:
    train:
      img_dir: "data/images/train"

    test:
      img_dir: "data/images/test"
    
  annotations:
    train : 
      ann_file: "data/annotations/train.json"
    test:
      ann_file: "data/annotations/test.json"

training:
  batch_size: 16
  num_epochs: 15
  

  learning_rate_schedule:
    - epochs: [0, 10]      
      lr: 0.01
    - epochs: [10, 13]     
      lr: 0.001
    - epochs: [13, 15]     
      lr: 0.0001

  learning_rate: 0.01
  momentum : 0.9
  weight_decay : 0.0001
